<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoro TV - Anime App</title>
    <meta name="description" content="Se anime gratis - Zoro TV App">
    <meta name="theme-color" content="#e50914">
    
    <link rel="manifest" href="data:application/manifest+json,{
        &quot;name&quot;:&quot;Zoro TV&quot;,
        &quot;short_name&quot;:&quot;ZoroTV&quot;,
        &quot;start_url&quot;:&quot;.&quot;,
        &quot;display&quot;:&quot;standalone&quot;,
        &quot;background_color&quot;:&quot;#000000&quot;,
        &quot;theme_color&quot;:&quot;#e50914&quot;,
        &quot;icons&quot;:[{
            &quot;src&quot;:&quot;https://zorotv.com.ro/favicon.ico&quot;,
            &quot;sizes&quot;:&quot;192x192&quot;,
            &quot;type&quot;:&quot;image/x-icon&quot;
        }]
    }">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; background:#000; overflow:hidden; font-family:Arial, sans-serif; }
        iframe { border:none; width:100%; height:100%; }
        .loader {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            color:white; font-size:18px; z-index:100; text-align:center;
        }
        .loader::after {
            content: "⏳"; display:block; font-size:40px; margin:10px;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">Indlæser Zoro TV...</div>
    <iframe id="frame" src="https://zorotv.com.ro/" allowfullscreen></iframe>

    <script>
        const loader = document.getElementById('loader');
        const frame = document.getElementById('frame');

        frame.onload = () => loader.style.display = 'none';

        // Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,'
                + 'self.addEventListener("install",()=>self.skipWaiting());'
                + 'self.addEventListener("activate",()=>self.clients.claim());'
            );
        }

        // Tryk på volumen op for at genindlæse (nyttigt trick)
        document.addEventListener('keydown', e => {
            if (e.key === 'VolumeUp') location.reload();
        });
    </script>
</body>
</html>
